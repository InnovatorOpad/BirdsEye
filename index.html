<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Nebula Core · Living Intelligence</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { width: 100%; height: 100%; overflow: hidden; background: #030307; font-family: system-ui, sans-serif; }
    canvas#canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
    #overlay-hud { position: absolute; top: 30px; left: 30px; z-index: 10; pointer-events: none; }
    #overlay-hud h1 { color: #fff; font-size: 1.4rem; font-weight: 300; letter-spacing: 0.3em; text-transform: uppercase; text-shadow: 0 0 20px rgba(255,255,255,0.4); }
    #overlay-hud p { color: #6c6c84; font-size: 0.75rem; letter-spacing: 0.1em; margin-top: 5px; }
    #instructions { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 10; color: rgba(255, 255, 255, 0.4); font-size: 0.8rem; letter-spacing: 0.15em; pointer-events: none; text-transform: uppercase; text-align: center; animation: pulse 2s infinite ease-in-out; }
    @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } }
  </style>
</head>
<body>

  <div id="overlay-hud">
    <h1>Nebula Core</h1>
    <p>Spatial Intelligence System v2.0</p>
  </div>

  <div id="instructions">⚡ Move mouse to distort space • Click anywhere to inject intelligence ⚡</div>
  <canvas id="canvas"></canvas>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let width = canvas.width = window.innerWidth;
    let height = canvas.height = window.innerHeight;

    window.addEventListener('resize', () => {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    });

    const mouse = { x: null, y: null, radius: 220, targetX: null, targetY: null };
    window.addEventListener('mousemove', (e) => { mouse.targetX = e.clientX; mouse.targetY = e.clientY; });
    window.addEventListener('mouseout', () => { mouse.targetX = null; mouse.targetY = null; });

    const conceptTitles = ["AI Autonomy", "Neural Synapse", "SaaS Pipeline", "Quantum Protocol", "Vector Node", "Spatial UI"];

    window.addEventListener('click', (e) => {
      const title = conceptTitles[Math.floor(Math.random() * conceptTitles.length)];
      createCoreNode(e.clientX, e.clientY, title);
      for (let i = 0; i < 25; i++) { particles.push(new EnergyParticle(e.clientX, e.clientY)); }
    });

    const nodes = [];
    const particles = [];

    class CoreNode {
      constructor(x, y, title) {
        this.x = x; this.y = y; this.baseX = x; this.baseY = y;
        this.title = title; this.size = Math.random() * 4 + 5;
        this.color = `hsl(${Math.random() * 60 + 190}, 100%, 75%)`;
        this.angle = Math.random() * Math.PI * 2;
        this.bounceRadius = Math.random() * 15 + 10;
      }
      update() {
        this.angle += 0.01;
        let targetX = this.baseX + Math.cos(this.angle) * this.bounceRadius;
        let targetY = this.baseY + Math.sin(this.angle) * this.bounceRadius;

        if (mouse.x !== null) {
          let dx = mouse.x - this.x; let dy = mouse.y - this.y;
          let dist = Math.sqrt(dx*dx + dy*dy);
          if (dist < mouse.radius) {
            let force = (mouse.radius - dist) / mouse.radius;
            targetX -= (dx / dist) * force * 50; targetY -= (dy / dist) * force * 50;
          }
        }
        this.x += (targetX - this.x) * 0.1; this.y += (targetY - this.y) * 0.1;
      }
      draw() {
        ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = this.color; ctx.shadowBlur = 15; ctx.shadowColor = this.color; ctx.fill(); ctx.shadowBlur = 0;
        ctx.fillStyle = 'rgba(255, 255, 255, 0.85)'; ctx.font = '600 11px system-ui, sans-serif';
        ctx.fillText(this.title.toUpperCase(), this.x + 15, this.y + 4);
      }
    }

    class EnergyParticle {
      constructor(x, y) {
        this.x = x; this.y = y;
        this.vx = (Math.random() - 0.5) * 8; this.vy = (Math.random() - 0.5) * 8;
        this.radius = Math.random() * 2 + 1; this.alpha = 1;
        this.decay = Math.random() * 0.02 + 0.01;
        this.color = `hsl(${Math.random() * 40 + 280}, 100%, 70%)`;
      }
      update() { this.x += this.vx; this.y += this.vy; this.vx *= 0.98; this.vy *= 0.98; this.alpha -= this.decay; }
      draw() { ctx.save(); ctx.globalAlpha = this.alpha; ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fillStyle = this.color; ctx.fill(); ctx.restore(); }
    }

    function createCoreNode(x, y, title) { nodes.push(new CoreNode(x, y, title)); }
    for (let i = 0; i < 6; i++) { createCoreNode(Math.random() * (width - 300) + 150, Math.random() * (height - 200) + 100, conceptTitles[i % conceptTitles.length]); }

    function loop() {
      ctx.fillStyle = 'rgba(3, 3, 7, 0.2)'; ctx.fillRect(0, 0, width, height);
      if (mouse.targetX !== null) {
        if (mouse.x === null) { mouse.x = mouse.targetX; mouse.y = mouse.targetY; }
        mouse.x += (mouse.targetX - mouse.x) * 0.08; mouse.y += (mouse.targetY - mouse.y) * 0.08;
      } else { mouse.x = null; mouse.y = null; }

      ctx.globalCompositeOperation = 'lighter';
      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          let dx = nodes[i].x - nodes[j].x; let dy = nodes[i].y - nodes[j].y; let dist = Math.sqrt(dx*dx + dy*dy);
          if (dist < 280) { ctx.beginPath(); ctx.strokeStyle = `rgba(142, 197, 255, ${0.15 * (1 - dist/280)})`; ctx.lineWidth = 1 - dist/280; ctx.moveTo(nodes[i].x, nodes[i].y); ctx.lineTo(nodes[j].x, nodes[j].y); ctx.stroke(); }
        }
      }
      ctx.globalCompositeOperation = 'source-over';
      nodes.forEach(node => { node.update(); node.draw(); });
      for (let i = particles.length - 1; i >= 0; i--) { particles[i].update(); if (particles[i].alpha <= 0) { particles.splice(i, 1); } else { particles[i].draw(); } }
      requestAnimationFrame(loop);
    }
    loop();
  </script>
</body>
</html>
