<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Strategic Nexus · Living Intelligence Platform</title>
  <style>
    :root {
      --bg-dark: #08090c;
      --panel-bg: rgba(13, 17, 23, 0.7);
      --panel-border: rgba(255, 255, 255, 0.08);
      --text-main: #f0f3f6;
      --text-muted: #8b949e;
      --accent-glow: rgba(142, 197, 255, 0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg-dark);
      color: var(--text-main);
      user-select: none;
    }

    /* Background Canvas with dynamic blending shaders effect via 2D context */
    canvas#bgCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* Infinite Space Workspace */
    #viewport {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
      cursor: grab;
    }

    #viewport:active {
      cursor: grabbing;
    }

    #nexus-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 1px;
      height: 1px;
      transform-origin: 0 0;
    }

    svg#connectionsSvg {
      position: absolute;
      top: 0;
      left: 0;
      width: 10000px;
      height: 10000px;
      pointer-events: auto;
      z-index: 2;
    }

    /* Nodes High-End Glassmorphic Styling */
    .node {
      position: absolute;
      width: 220px;
      background: rgba(18, 22, 31, 0.6);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 10px 30px rgba(0,0,0,0.4), inset 0 1px 1px rgba(255,255,255,0.1);
      padding: 16px;
      cursor: grab;
      z-index: 10;
      transform-origin: center;
      transition: border-color 0.3s, box-shadow 0.3s, background 0.3s;
      will-change: transform, left, top;
    }

    .node:hover {
      border-color: rgba(255, 255, 255, 0.25);
      background: rgba(24, 30, 43, 0.75);
      box-shadow: 0 15px 40px rgba(0,0,0,0.6), 0 0 25px var(--glow-color);
      z-index: 100;
    }

    .node:active {
      cursor: grabbing;
    }

    .node h3 {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 6px;
      letter-spacing: -0.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .node p {
      font-size: 0.78rem;
      color: var(--text-muted);
      line-height: 1.4;
      height: 36px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .node .meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.7rem;
      border-top: 1px solid rgba(255,255,255,0.05);
      padding-top: 10px;
    }

    .node .tag {
      background: rgba(255,255,255,0.06);
      padding: 2px 8px;
      border-radius: 20px;
      text-transform: uppercase;
      font-weight: 500;
      letter-spacing: 0.03em;
    }

    .node .priority-indicator {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .node .priority-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    /* Headless Overlays & HUD */
    .hud-panel {
      position: fixed;
      background: var(--panel-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--panel-border);
      border-radius: 14px;
      z-index: 1000;
      padding: 14px;
    }

    #brand-hud {
      top: 20px;
      left: 20px;
    }

    #brand-hud h1 {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: #fff;
    }

    #controls-hud {
      bottom: 20px;
      left: 20px;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 500;
      transition: background 0.2s, border-color 0.2s;
    }

    .btn:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.2);
    }

    /* Node Creator Modal Side Panel */
    #creator-panel {
      top: 20px;
      right: 20px;
      width: 300px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    #creator-panel h2 {
      font-size: 0.9rem;
      color: #fff;
      margin-bottom: 4px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .form-group label {
      font-size: 0.7rem;
      color: var(--text-muted);
    }

    .form-group input, .form-group select, .form-group textarea {
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      padding: 8px;
      color: #fff;
      font-size: 0.8rem;
      outline: none;
    }

    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color: #8ec5ff;
    }

    /* Lighting Ambient overlay layer */
    #ambient-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      z-index: 3;
      mix-blend-mode: overlay;
      opacity: 0.7;
    }
  </style>
</head>
<body>

  <canvas id="bgCanvas"></canvas>
  <div id="ambient-overlay"></div>

  <div id="brand-hud" class="hud-panel">
    <h1>STRATEGIC NEXUS</h1>
  </div>

  <div id="controls-hud" class="hud-panel">
    <button class="btn" id="btn-zoom-in">➕ Zoom In</button>
    <button class="btn" id="btn-zoom-out">➖ Zoom Out</button>
    <button class="btn" id="btn-reset">🎯 Recenter</button>
    <span id="time-indicator" style="font-size: 0.75rem; color: var(--text-muted); margin-left: 10px;">☀️ Noon</span>
  </div>

  <div id="creator-panel" class="hud-panel">
    <h2>Create Concept Node</h2>
    <div class="form-group">
      <label>Title</label>
      <input type="text" id="node-title" placeholder="e.g., Quantum Engine Core">
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="node-desc" rows="2" placeholder="Brief contextual data..."></textarea>
    </div>
    <div class="form-group">
      <label>Type Dimension</label>
      <select id="node-type">
        <option value="goal">Goal (Strategic)</option>
        <option value="idea">Idea (Conceptual)</option>
        <option value="project">Project (Operational)</option>
        <option value="person">Person (Actor)</option>
        <option value="insight">Insight (Data)</option>
      </select>
    </div>
    <div class="form-group">
      <label>Priority</label>
      <select id="node-priority">
        <option value="1">High (Critical)</option>
        <option value="2" selected>Medium (Standard)</option>
        <option value="3">Low (Backlog)</option>
      </select>
    </div>
    <button class="btn" id="btn-add-node" style="background: rgba(142, 197, 255, 0.15); border-color: rgba(142, 197, 255, 0.3);">⚡ Inject into Nexus</button>
  </div>

  <div id="viewport">
    <div id="nexus-container">
      <svg id="connectionsSvg"></svg>
      </div>
  </div>

  <script>
    (function() {
      // --- ARCHITECTURAL DATA MODEL ---
      let nodesData = [
        { id: "n1", type: "goal", title: "Global Expansion", description: "Scale operations into APAC and EU markets by Q4.", priority: 1, fx: null, fy: null },
        { id: "n2", type: "idea", title: "Neural Mesh UI", description: "Real-time vector topology engine for spatial cognitive mapping.", priority: 2, fx: null, fy: null },
        { id: "n3", type: "project", title: "Project Nexus", description: "Core visualization infrastructure and database aggregation.", priority: 1, fx: null, fy: null },
        { id: "n4", type: "person", title: "Dr. Yara Al-Najjar", description: "Chief Technical Strategist & Network Systems Architect.", priority: 1, fx: null, fy: null },
        { id: "n5", type: "insight", title: "Cognitive Fatigue", description: "User retention profiles scale cleanly with high spatial fidelity layouts.", priority: 3, fx: null, fy: null }
      ];

      let edgesData = [
        { from: "n1", to: "n3", strength: 0.9 },
        { from: "n2", to: "n3", strength: 0.75 },
        { from: "n4", to: "n1", strength: 0.85 },
        { from: "n4", to: "n2", strength: 0.6 },
        { from: "n5", to: "n2", strength: 0.5 }
      ];

      // Spatial State Mapping
      let nodeMap = new Map();
      let scale = 0.85;
      let panX = window.innerWidth / 2 - 300;
      let panY = window.innerHeight / 2 - 250;
      let timeOfDay = 0.35; // Cyclic timeline float tracker

      // Physics Constants for Custom Simulation Engine
      const friction = 0.82;
      const repulsionConstant = 40000;
      const springLength = 180;
      const springStrength = 0.04;

      const viewport = document.getElementById('viewport');
      const container = document.getElementById('nexus-container');
      const svg = document.getElementById('connectionsSvg');
      const canvas = document.getElementById('bgCanvas');
      const ctx = canvas.getContext('2d');

      // Colors mapping for High-end visual tags and glow profiles
      const typeColors = {
        goal: '#FFB347', idea: '#8EC5FF', project: '#C77DFF', person: '#FF9A9E', insight: '#A18CD1'
      };

      // --- INITIALIZE GRAPH STRUCTS ---
      function initGraph() {
        // Distribute nodes organically initially
        nodesData.forEach((nd, i) => {
          if (!nd.x) {
            nd.x = 400 + Math.cos(i) * 200;
            nd.y = 300 + Math.sin(i) * 200;
          }
          nd.vx = 0;
          nd.vy = 0;
          
          const el = createNodeDOM(nd);
          nodeMap.set(nd.id, { data: nd, element: el });
        });
        updateTransform();
      }

      function createNodeDOM(nd) {
        const div = document.createElement('div');
        div.className = 'node';
        div.id = `node-${nd.id}`;
        div.style.setProperty('--glow-color', rgbaFromHex(typeColors[nd.type], 0.15));
        
        div.innerHTML = `
          <h3 title="${nd.title}">${nd.title}</h3>
          <p>${nd.description || 'No descriptive data bound to node.'}</p>
          <div class="meta">
            <span class="tag" style="color:${typeColors[nd.type]}">${nd.type}</span>
            <div class="priority-indicator" style="color:${nd.priority===1?'#FF6B6B':nd.priority===2?'#FECA57':'#48DBFB'}">
              <span class="priority-dot"></span>
              <span>P${nd.priority}</span>
            </div>
          </div>
        `;
        container.appendChild(div);
        bindDragEvents(div, nd);
        return div;
      }

      // --- ADVANCED PHYSICS ENGINE (Force-Directed Graph Traversal) ---
      function updatePhysics() {
        // 1. Repulsion force between all node pairs (Coulomb's Law adaptation)
        for (let i = 0; i < nodesData.length; i++) {
          let n1 = nodesData[i];
          for (let j = i + 1; j < nodesData.length; j++) {
            let n2 = nodesData[j];
            let dx = n1.x - n2.x;
            let dy = n1.y - n2.y;
            if (dx === 0) dx = 0.1; // Prevent division by zero singularities
            let distSq = dx * dx + dy * dy;
            let dist = Math.sqrt(distSq);
            
            if (dist < 400) {
              let force = repulsionConstant / (distSq + 100);
              let fx = (dx / dist) * force;
              let fy = (dy / dist) * force;
              
              if (!n1.fixed) { n1.vx += fx; n1.vy += fy; }
              if (!n2.fixed) { n2.vx -= fx; n2.vy -= fy; }
            }
          }
        }

        // 2. Attraction forces along edges (Hooke's Law adaptation)
        edgesData.forEach(edge => {
          let n1 = nodesData.find(n => n.id === edge.from);
          let n2 = nodesData.find(n => n.id === edge.to);
          if (!n1 || n2 === undefined) return;
          
          let dx = n2.x - n1.x;
          let dy = n2.y - n1.y;
          let dist = Math.sqrt(dx * dx + dy * dy) || 0.1;
          let displacement = dist - springLength;
          let force = displacement * springStrength * edge.strength;
          let fx = (dx / dist) * force;
          let fy = (dy / dist) * force;
          
          if (!n1.fixed) { n1.vx += fx; n1.vy += fy; }
          if (!n2.fixed) { n2.vx -= fx; n2.vy -= fy; }
        });

        // 3. Update positions with kinematic integration steps
        nodesData.forEach(nd => {
          if (nd.fixed) return;
          nd.vx *= friction;
          nd.vy *= friction;
          nd.x += nd.vx;
          nd.y += nd.vy;
        });
      }

      // --- RENDERING PIPELINE ---
      function drawGraphElements() {
        // Sync HTML Node spatial transform tracks
        nodeMap.forEach((nodeObj, id) => {
          const nd = nodeObj.data;
          nodeObj.element.style.left = `${nd.x}px`;
          nodeObj.element.style.top = `${nd.y}px`;
        });

        // Sync SVG Curved Vector paths
        svg.innerHTML = '';
        edgesData.forEach(edge => {
          const n1 = nodesData.find(n => n.id === edge.from);
          const n2 = nodesData.find(n => n.id === edge.to);
          if (!n1 || !n2) return;

          // Compute offsets to center node structures safely
          const fromX = n1.x + 110;
          const fromY = n1.y + 45;
          const toX = n2.x + 110;
          const toY = n2.y + 45;

          const dx = toX - fromX;
          const dy = toY - fromY;
          const dist = Math.sqrt(dx*dx + dy*dy);
          
          // Generate programmatic complex curve vectors
          const curveFactor = Math.min(0.25, 120 / dist);
          const midX = (fromX + toX) / 2 - dy * curveFactor;
          const midY = (fromY + toY) / 2 + dx * curveFactor;

          const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          path.setAttribute('d', `M ${fromX} ${fromY} Q ${midX} ${midY} ${toX} ${toY}`);
          path.setAttribute('fill', 'none');
          path.setAttribute('stroke', `rgba(255,255,255,${0.1 + edge.strength * 0.25})`);
          path.setAttribute('stroke-width', `${1 + edge.strength * 2.5}`);
          path.setAttribute('stroke-linecap', 'round');
          
          // Micro-interaction styling overlays inside vector layer
          path.style.transition = 'stroke 0.2s, stroke-width 0.2s';
          path.addEventListener('mouseenter', () => {
            path.setAttribute('stroke', '#8EC5FF');
            path.setAttribute('stroke-width', `${3 + edge.strength * 2}`);
          });
          path.addEventListener('mouseleave', () => {
            path.setAttribute('stroke', `rgba(255,255,255,${0.1 + edge.strength * 0.25})`);
            path.setAttribute('stroke-width', `${1 + edge.strength * 2.5}`);
          });

          svg.appendChild(path);
        });
      }

      // --- CAMERA SPACE MANAGEMENT (PAN & ZOOM) ---
      let isPanning = false;
      let startPan = { x: 0, y: 0 };

      viewport.addEventListener('mousedown', (e) => {
        if (e.target === viewport || e.target === svg) {
          isPanning = true;
          startPan = { x: e.clientX - panX, y: e.clientY - panY };
        }
      });

      window.addEventListener('mousemove', (e) => {
        if (!isPanning) return;
        panX = e.clientX - startPan.x;
        panY = e.clientY - startPan.y;
        updateTransform();
      });

      window.addEventListener('mouseup', () => { isPanning = false; });

      viewport.addEventListener('wheel', (e) => {
        e.preventDefault();
        const zoomIntensity = 0.05;
        const mouseX = e.clientX - viewport.offsetLeft;
        const mouseY = e.clientY - viewport.offsetTop;
        
        const wheel = e.deltaY < 0 ? 1 : -1;
        const zoomFactor = Math.exp(wheel * zoomIntensity);
        
        // Geometric zoom centering algorithm logic
        panX = mouseX - (mouseX - panX) * zoomFactor;
        panY = mouseY - (mouseY - panY) * zoomFactor;
        scale *= zoomFactor;
        scale = Math.min(Math.max(0.2, scale), 3); // Guard rails
        
        updateTransform();
      }, { passive: false });

      function updateTransform() {
        container.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
      }

      // --- DRAG INTERACTION PROCESSING ---
      function bindDragEvents(el, nd) {
        let dragOffsetX = 0;
        let dragOffsetY = 0;

        el.addEventListener('mousedown', (e) => {
          e.stopPropagation();
          nd.fixed = true;
          
          // Compute true matrix scale drag coordinates adjustments
          const rect = el.getBoundingClientRect();
          dragOffsetX = (e.clientX - rect.left) / scale;
          dragOffsetY = (e.clientY - rect.top) / scale;
          
          window.addEventListener('mousemove', onNodeDrag);
          window.addEventListener('mouseup', onNodeDragEnd);
        });

        function onNodeDrag(e) {
          const containerRect = container.getBoundingClientRect();
          nd.x = (e.clientX - containerRect.left) / scale - dragOffsetX;
          nd.y = (e.clientY - containerRect.top) / scale - dragOffsetY;
        }

        function onNodeDragEnd() {
          nd.fixed = false;
          window.removeEventListener('mousemove', onNodeDrag);
          window.removeEventListener('mouseup', onNodeDragEnd);
        }
      }

      // --- HIGH-END BACKGROUND SHADER EMULATION PIPELINE ---
      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();

      function drawAmbientBackground() {
        const w = canvas.width;
        const h = canvas.height;
        ctx.clearRect(0, 0, w, h);

        // Blending interpolation spaces mapping vectors
        const cSunrise = { r: 42, g: 24, b: 61 };
        const cNoon = { r: 10, g: 16, b: 36 };
        const cSunset = { r: 61, g: 29, b: 24 };

        let currentBase;
        if (timeOfDay < 0.5) {
          currentBase = lerpColor(cSunrise, cNoon, timeOfDay * 2);
        } else {
          currentBase = lerpColor(cNoon, cSunset, (timeOfDay - 0.5) * 2);
        }

        ctx.fillStyle = `rgb(${currentBase.r}, ${currentBase.g}, ${currentBase.b})`;
        ctx.fillRect(0, 0, w, h);

        // Accentuate glow intersections nodes spaces dynamically 
        const grad = ctx.createRadialGradient(w*0.5, h*0.5, 10, w*0.5, h*0.5, Math.max(w, h));
        grad.addColorStop(0, 'rgba(142, 197, 255, 0.04)');
        grad.addColorStop(1, 'rgba(0, 0, 0, 0.4)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, w, h);
      }

      function lerpColor(a, b, t) {
        return {
          r: Math.floor(a.r + (b.r - a.r) * t),
          g: Math.floor(a.g + (b.g - a.g) * t),
          b: Math.floor(a.b + (b.b - a.b) * t)
        };
      }

      function updateTimelineHUD() {
        const lbl = document.getElementById('time-indicator');
        if (timeOfDay < 0.25) lbl.textContent = '🌅 Sunrise Cycle';
        else if (timeOfDay < 0.65) lbl.textContent = '☀️ High Noon Space';
        else lbl.textContent = '🌇 Dimensional Sunset';
      }

      // --- MUTATION DATA CONTROLS (CRUD INTERFACE) ---
      document.getElementById('btn-add-node').addEventListener('click', () => {
        const titleIn = document.getElementById('node-title');
        const descIn = document.getElementById('node-desc');
        const typeIn = document.getElementById('node-type');
        const priorityIn = document.getElementById('node-priority');

        if (!titleIn.value.trim()) return;

        const newId = `n-${Date.now()}`;
        const newNode = {
          id: newId,
          title: titleIn.value,
          description: descIn.value,
          type: typeIn.value,
          priority: parseInt(priorityIn.value),
          x: 400 + (Math.random() - 0.5) * 100,
          y: 300 + (Math.random() - 0.5) * 100,
          vx: 0, vy: 0
        };

        nodesData.push(newNode);
        
        // Auto-connect engine heuristic to keep nodes integrated seamlessly 
        if (nodesData.length > 1) {
          const closestNode = nodesData[Math.floor(Math.random() * (nodesData.length - 1))];
          edgesData.push({ from: closestNode.id, to: newNode.id, strength: 0.5 + Math.random() * 0.4 });
        }

        const dom = createNodeDOM(newNode);
        nodeMap.set(newNode.id, { data: newNode, element: dom });

        titleIn.value = '';
        descIn.value = '';
      });

      // HUD Button Listeners
      document.getElementById('btn-zoom-in').addEventListener('click', () => { scale *= 1.2; updateTransform(); });
      document.getElementById('btn-zoom-out').addEventListener('click', () => { scale /= 1.2; updateTransform(); });
      document.getElementById('btn-reset').addEventListener('click', () => {
        scale = 0.85;
        panX = window.innerWidth / 2 - 300;
        panY = window.innerHeight / 2 - 250;
        updateTransform();
      });

      // Utilities
      function rgbaFromHex(hex, alpha) {
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        return `rgba(${r}, ${g}, ${b}, ${alpha})`;
      }

      // --- MASTER TICK LOOP SYSTEM ---
      let directionalPulse = 0.0003;
      function masterCycleLoop() {
        // Temporal processing mechanics
        timeOfDay += directionalPulse;
        if (timeOfDay > 1 || timeOfDay < 0) directionalPulse *= -1;

        updatePhysics();
        drawGraphElements();
        drawAmbientBackground();
        updateTimelineHUD();

        requestAnimationFrame(masterCycleLoop);
      }

      // Bootstrap Platform
      initGraph();
      masterCycleLoop();
    })();
  </script>
</body>
</html>
