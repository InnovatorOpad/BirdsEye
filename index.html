<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Strategic Nexus · Living Intelligence</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      user-select: none;
      background: #0b0c10;
    }

    canvas#bgCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    #nexus-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
      transform-origin: 0 0;
    }

    svg#connectionsSvg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .node {
      position: absolute;
      min-width: 160px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 0 30px rgba(255,255,255,0.05);
      padding: 16px 20px;
      cursor: grab;
      transition: transform 0.2s ease, box-shadow 0.3s, background 0.3s;
      z-index: 10;
      pointer-events: auto;
      color: #fff;
      animation: float 6s ease-in-out infinite;
      transform-origin: center;
    }

    .node:hover {
      transform: scale(1.05);
      box-shadow: 0 25px 50px rgba(0,0,0,0.7), 0 0 30px var(--glow-color);
      background: rgba(255, 255, 255, 0.08);
      z-index: 100;
    }

    .node:active {
      cursor: grabbing;
    }

    .node h3 {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 6px;
      letter-spacing: 0.02em;
    }

    .node p {
      font-size: 0.8rem;
      opacity: 0.7;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .node .meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      font-size: 0.7rem;
      opacity: 0.8;
    }

    .node .priority-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
      100% { transform: translateY(0px); }
    }

    /* lighting overlay (subtle) */
    #lighting-overlay {
      position: fixed;
      top:0; left:0; width:100%; height:100%;
      pointer-events: none;
      z-index: 2;
      background: radial-gradient(circle at 20% 10%, rgba(255,179,71,0.08) 0%, transparent 50%),
                  radial-gradient(circle at 50% 0%, rgba(142,197,255,0.12) 0%, transparent 50%),
                  radial-gradient(circle at 80% 10%, rgba(199,125,255,0.1) 0%, transparent 50%);
      mix-blend-mode: overlay;
    }

    #time-of-day-label {
      position: fixed;
      bottom: 20px;
      left: 20px;
      color: rgba(255,255,255,0.5);
      font-size: 0.75rem;
      z-index: 100;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(8px);
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    #title-overlay {
      position: fixed;
      top: 24px;
      left: 28px;
      z-index: 100;
      color: rgba(255,255,255,0.9);
      font-size: 1.2rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
      padding: 8px 24px;
      border-radius: 30px;
      border: 1px solid rgba(255,255,255,0.15);
    }
  </style>
</head>
<body>
  <canvas id="bgCanvas"></canvas>
  <div id="lighting-overlay"></div>
  <div id="title-overlay">STRATEGIC NEXUS</div>
  <div id="time-of-day-label">☀️ Noon</div>

  <div id="nexus-container">
    <svg id="connectionsSvg"></svg>
    <!-- nodes injected dynamically -->
  </div>

  <script>
    (function() {
      // ---------- DATA MODEL ----------
      const nodesData = [
        { id: "n1", type: "goal", title: "Market Expansion", description: "Expand into APAC region by Q4", priority: 1, status: "active", energyLevel: 0.9 },
        { id: "n2", type: "idea", title: "AI Personalization", description: "Real-time user behavior engine", priority: 2, status: "pending", energyLevel: 0.7 },
        { id: "n3", type: "project", title: "Nexus Platform", description: "Core intelligence dashboard", priority: 1, status: "active", energyLevel: 0.8 },
        { id: "n4", type: "person", title: "Dr. Yara", description: "Head of Strategy", priority: 1, status: "active", energyLevel: 0.95 },
        { id: "n5", type: "task", title: "Prototype V2", description: "Interactive graph with time-of-day lighting", priority: 2, status: "active", energyLevel: 0.6 },
        { id: "n6", type: "insight", title: "Cognitive Load", description: "Users prefer spatial memory cues", priority: 3, status: "pending", energyLevel: 0.4 },
      ];

      const edgesData = [
        { from: "n1", to: "n3", type: "dependency", strength: 0.9 },
        { from: "n2", to: "n3", type: "influence", strength: 0.7 },
        { from: "n4", to: "n1", type: "relation", strength: 0.8 },
        { from: "n4", to: "n5", type: "relation", strength: 0.5 },
        { from: "n6", to: "n2", type: "influence", strength: 0.4 },
        { from: "n5", to: "n3", type: "dependency", strength: 0.85 },
        { from: "n6", to: "n4", type: "conflict", strength: 0.3 },
      ];

      // initial positions spread around
      const initialPositions = {
        n1: { x: 300, y: 250 },
        n2: { x: 650, y: 150 },
        n3: { x: 500, y: 400 },
        n4: { x: 200, y: 500 },
        n5: { x: 750, y: 450 },
        n6: { x: 400, y: 100 }
      };

      // ---------- CANVAS BACKGROUND (radial gradients simulating time-of-day) ----------
      const canvas = document.getElementById('bgCanvas');
      const ctx = canvas.getContext('2d');
      let timeOfDay = 0.5; // 0..1 (sunrise..sunset)
      let autoCycle = true;
      let cycleDirection = 0.2; 

      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();

      function drawBackground() {
        const w = canvas.width;
        const h = canvas.height;
        // map timeOfDay to three color stops
        const sunriseColor = { r: 255, g: 179, b: 71 };  // #FFB347
        const noonColor = { r: 142, g: 197, b: 255 };    // #8EC5FF
        const sunsetColor = { r: 199, g: 125, b: 255 };  // #C77DFF

        // blend based on timeOfDay (0->sunrise, 0.5->noon, 1->sunset)
        let color1, color2, color3;
        if (timeOfDay <= 0.5) {
          const t = timeOfDay / 0.5;
          color1 = lerpColor(sunriseColor, noonColor, t);
          color2 = noonColor;
          color3 = lerpColor(sunsetColor, noonColor, 1 - t);
        } else {
          const t = (timeOfDay - 0.5) / 0.5;
          color1 = lerpColor(noonColor, sunsetColor, t);
          color2 = sunsetColor;
          color3 = lerpColor(sunriseColor, sunsetColor, 0.3 + t * 0.3);
        }

        ctx.clearRect(0, 0, w, h);
        // create radial gradients at three points
        const leftGrad = ctx.createRadialGradient(w * 0.15, h * 0.1, 50, w * 0.15, h * 0.1, w * 1.2);
        leftGrad.addColorStop(0, `rgba(${color1.r},${color1.g},${color1.b},0.25)`);
        leftGrad.addColorStop(1, 'transparent');
        ctx.fillStyle = leftGrad;
        ctx.fillRect(0, 0, w, h);

        const topGrad = ctx.createRadialGradient(w * 0.5, h * -0.2, 50, w * 0.5, h * -0.2, w * 1.3);
        topGrad.addColorStop(0, `rgba(${color2.r},${color2.g},${color2.b},0.2)`);
        topGrad.addColorStop(1, 'transparent');
        ctx.fillStyle = topGrad;
        ctx.fillRect(0, 0, w, h);

        const rightGrad = ctx.createRadialGradient(w * 0.85, h * 0.1, 50, w * 0.85, h * 0.1, w * 1.2);
        rightGrad.addColorStop(0, `rgba(${color3.r},${color3.g},${color3.b},0.2)`);
        rightGrad.addColorStop(1, 'transparent');
        ctx.fillStyle = rightGrad;
        ctx.fillRect(0, 0, w, h);

        // subtle global gradient
        const baseGrad = ctx.createLinearGradient(0, 0, 0, h);
        baseGrad.addColorStop(0, 'rgba(10,10,20,0.6)');
        baseGrad.addColorStop(0.7, 'rgba(5,5,15,0.8)');
        ctx.fillStyle = baseGrad;
        ctx.fillRect(0, 0, w, h);
      }

      function lerpColor(c1, c2, t) {
        return {
          r: Math.round(c1.r + (c2.r - c1.r) * t),
          g: Math.round(c1.g + (c2.g - c1.g) * t),
          b: Math.round(c1.b + (c2.b - c1.b) * t)
        };
      }

      function updateTimeLabel() {
        const label = document.getElementById('time-of-day-label');
        if (timeOfDay < 0.2) label.textContent = '🌅 Sunrise';
        else if (timeOfDay < 0.4) label.textContent = '🌤 Morning';
        else if (timeOfDay < 0.6) label.textContent = '☀️ Noon';
        else if (timeOfDay < 0.8) label.textContent = '🌇 Afternoon';
        else label.textContent = '🌙 Sunset';
      }

      // ---------- NODE RENDERING ----------
      const container = document.getElementById('nexus-container');
      const svg = document.getElementById('connectionsSvg');
      let nodes = new Map(); // id -> { element, x, y, data }
      let scale = 1;
      let panX = 0, panY = 0;
      let isPanning = false;
      let panStart = { x: 0, y: 0 };
      let containerStart = { x: 0, y: 0 };

      function createNodeElement(nodeData, pos) {
        const div = document.createElement('div');
        div.className = 'node';
        div.dataset.id = nodeData.id;
        div.style.left = pos.x + 'px';
        div.style.top = pos.y + 'px';
        div.style.setProperty('--glow-color', getGlowColor(nodeData.type));
        div.innerHTML = `
          <h3>${nodeData.title}</h3>
          <p>${nodeData.description || ''}</p>
          <div class="meta">
            <span class="priority-dot" style="color:${getPriorityColor(nodeData.priority)}"></span>
            <span>${nodeData.type.toUpperCase()}</span>
            <span>⚡${nodeData.energyLevel ? Math.round(nodeData.energyLevel*100)+'%' : ''}</span>
          </div>
        `;
        container.appendChild(div);
        return div;
      }

      function getGlowColor(type) {
        const map = {
          goal: '#FFB347',
          idea: '#8EC5FF',
          project: '#C77DFF',
          person: '#FF9A9E',
          task: '#FEE140',
          insight: '#A18CD1'
        };
        return map[type] || '#ffffff';
      }

      function getPriorityColor(priority) {
        return priority === 1 ? '#FF6B6B' : priority === 2 ? '#FECA57' : '#48DBFB';
      }

      // initialize nodes
      nodesData.forEach(nd => {
        const pos = initialPositions[nd.id] || { x: 100, y: 100 };
        const el = createNodeElement(nd, pos);
        nodes.set(nd.id, { element: el, x: pos.x, y: pos.y, data: nd });
        makeDraggable(el);
      });

      // ---------- DRAGGING ----------
      function makeDraggable(el) {
        let offsetX, offsetY, startX, startY;
        el.addEventListener('mousedown', (e) => {
          if (e.button !== 0) return;
          e.stopPropagation();
          const nodeObj = nodes.get(el.dataset.id);
          if (!nodeObj) return;
          const rect = el.getBoundingClientRect();
          offsetX = e.clientX - rect.left;
          offsetY = e.clientY - rect.top;
          startX = nodeObj.x;
          startY = nodeObj.y;
          el.style.zIndex = 1000;
          el.style.transition = 'none';
          window.addEventListener('mousemove', onDrag);
          window.addEventListener('mouseup', onDragEnd);
        });

        function onDrag(e) {
          const nodeObj = nodes.get(el.dataset.id);
          if (!nodeObj) return;
          // convert screen to container coords considering pan/zoom
          const containerRect = container.getBoundingClientRect();
          const mouseX = (e.clientX - containerRect.left - panX) / scale;
          const mouseY = (e.clientY - containerRect.top - panY) / scale;
          nodeObj.x = mouseX - offsetX / scale;
          nodeObj.y = mouseY - offsetY / scale;
          el.style.left = nodeObj.x + 'px';
          el.style.top = nodeObj.y + 'px';
          drawConnections();
        }

        function onDragEnd() {
          el.style.transition = '';
          el.style.zIndex = 10;
          window.removeEventListener('mousemove', onDrag);
          window.removeEventListener('mouseup', onDragEnd);
        }
      }

      // ---------- SVG CONNECTIONS ----------
      function drawConnections() {
        svg.innerHTML = '';
        edgesData.forEach(edge => {
          const fromNode = nodes.get(edge.from);
          const toNode = nodes.get(edge.to);
          if (!fromNode || !toNode) return;

          const fromX = fromNode.x + 80; // approximate center
          const fromY = fromNode.y + 50;
          const toX = toNode.x + 80;
          const toY = toNode.y + 50;

          const dx = toX - fromX;
          const dy = toY - fromY;
          const dist = Math.sqrt(dx*dx+dy*dy);
          const curvature = Math.min(0.4, dist * 0.001);
          const midX = (fromX + toX) / 2 - dy * curvature;
          const midY = (fromY + toY) / 2 + dx * curvature;

          const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          const d = `M ${fromX} ${fromY} Q ${midX} ${midY} ${toX} ${toY}`;
          path.setAttribute('d', d);
          path.setAttribute('fill', 'none');
          path.setAttribute('stroke', `rgba(255,255,255,${0.2 + edge.strength * 0.3})`);
          path.setAttribute('stroke-width', 1 + edge.strength * 2.5);
          path.setAttribute('stroke-linecap', 'round');
          path.setAttribute('data-edge', `${edge.from}-${edge.to}`);
          path.style.pointerEvents = 'stroke';
          path.style.cursor = 'pointer';

          // animated dash for flow
          path.style.strokeDasharray = '8, 12';
          path.style.animation = `dashFlow ${2 - edge.strength}s linear infinite`;

          // interaction: hover highlight
          path.addEventListener('mouseenter', () => {
            path.setAttribute('stroke', 'rgba(255,215,0,0.9)');
            path.style.strokeWidth = 3;
          });
          path.addEventListener('mouseleave', () => {
            path.setAttribute('stroke', `rgba(255,255,255,${0.2 + edge.strength * 0.3})`);
            path.style.strokeWidth = 1 + edge.strength * 2.5;
          });

          svg.appendChild(path);
        });
      }

      // add keyframes for dash flow
      const styleSheet = document.createElement("style");
      styleSheet.textContent = `
        @keyframes dashFlow {
          to { stroke-dashoffset: -40; }
        }
      `;
      document.head.appendChild(styleSheet);

      // ---------- PAN & ZOOM ----------
      container.addEventListener('mousedown', (e) => {
        if (e.target === container || e.target.id === 'connectionsSvg') {
          isPanning = true;
          panStart = { x: e.clientX, y: e.clientY };
          containerStart = { x: panX, y: panY };
          container.style.cursor = 'grabbing';
          e.preventDefault();
        }
      });

      window.addEventListener('mousemove', (e) => {
        if (!isPanning) return;
        panX = containerStart.x + (e.clientX - panStart.x);
        panY = containerStart.y + (e.clientY - panStart.y);
        container.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
      });

      window.addEventListener('mouseup', () => {
        if (isPanning) {
          isPanning = false;
          container.style.cursor = 'default';
        }
      });

      container.addEventListener('wheel', (e) => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? 0.95 : 1.05;
        scale = Math.min(Math.max(0.3, scale * delta), 2.5);
        container.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
      }, { passive: false });

      // ---------- ANIMATION LOOP (background + time cycle) ----------
      function animate() {
        if (autoCycle) {
          timeOfDay += 0.0002;
          if (timeOfDay > 1.0) timeOfDay = 1.0;
          if (timeOfDay < 0.0) timeOfDay = 0.0;
          // bounce back
          if (timeOfDay >= 1.0) cycleDirection = -0.3;
          if (timeOfDay <= 0.0) cycleDirection = 0.3;
          timeOfDay += cycleDirection * 0.001;
          timeOfDay = Math.min(1, Math.max(0, timeOfDay));
        }
        drawBackground();
        updateTimeLabel();
        requestAnimationFrame(animate);
      }
      animate();

      // initial draw
      drawConnections();
      // redraw connections on any node move (handled in drag)
      // also on zoom/pan we might need to recalc? No, connections are in container coords.

      // click node to focus? not implemented but could be added.
      console.log('✨ Strategic Nexus ready — drag nodes, scroll to zoom, watch the light shift.');
    })();
  </script>
</body>
  </html>
